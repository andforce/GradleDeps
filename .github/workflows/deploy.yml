name: 构建并部署到服务器

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOMAIN: deps.aimfor.top
  WEB_ROOT: /var/www/deps.aimfor.top

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建
        run: npm run build

      - name: 初始化服务器环境
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            # 等待其他 apt 进程释放锁（最多等 3 分钟）
            wait_apt_lock() {
              local i=0
              while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
                if [ $i -ge 36 ]; then
                  echo "ERROR: apt lock not released after 3 minutes"
                  exit 1
                fi
                echo "Waiting for apt lock... ($((i * 5))s)"
                sleep 5
                i=$((i + 1))
              done
            }

            write_bootstrap_nginx_conf() {
              cat > /etc/nginx/sites-available/${{ env.DOMAIN }} << 'NGINX_CONF'
            server {
                listen 80;
                listen [::]:80;
                server_name ${{ env.DOMAIN }};

                root ${{ env.WEB_ROOT }};
                index index.html;

                location /.well-known/acme-challenge/ {
                    try_files $uri =404;
                }

                location / {
                    try_files $uri $uri/ /index.html;
                }

                location /assets/ {
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }
            }
            NGINX_CONF
            }

            write_https_nginx_conf() {
              cat > /etc/nginx/sites-available/${{ env.DOMAIN }} << 'NGINX_CONF'
            server {
                listen 80;
                listen [::]:80;
                server_name ${{ env.DOMAIN }};

                location /.well-known/acme-challenge/ {
                    root ${{ env.WEB_ROOT }};
                    try_files $uri =404;
                }

                location / {
                    return 301 https://$host$request_uri;
                }
            }

            server {
                listen 443 ssl http2;
                listen [::]:443 ssl http2;
                server_name ${{ env.DOMAIN }};

                root ${{ env.WEB_ROOT }};
                index index.html;

                ssl_certificate /etc/letsencrypt/live/${{ env.DOMAIN }}/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/${{ env.DOMAIN }}/privkey.pem;
                ssl_session_timeout 1d;
                ssl_session_cache shared:SSL:10m;
                ssl_session_tickets off;
                ssl_protocols TLSv1.2 TLSv1.3;

                add_header Strict-Transport-Security "max-age=31536000" always;

                location / {
                    try_files $uri $uri/ /index.html;
                }

                location /assets/ {
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }
            }
            NGINX_CONF
            }

            ensure_ports_are_compatible() {
              local listeners
              listeners="$(ss -ltnp '( sport = :80 or sport = :443 )' 2>/dev/null || true)"

              if [ -z "$listeners" ]; then
                return 0
              fi

              if echo "$listeners" | grep -Eq 'users:\(\("nginx"'; then
                if echo "$listeners" | grep -Ev 'State|Recv-Q|Send-Q|nginx' | grep -q .; then
                  echo "ERROR: ports 80/443 are already used by a non-nginx process"
                  echo "$listeners"
                  exit 1
                fi
                return 0
              fi

              echo "ERROR: shared 80/443 deployment requires nginx to own these ports"
              echo "$listeners"
              exit 1
            }

            # 按需安装缺失工具（一次 update，减少耗时）
            PKGS_TO_INSTALL=""
            command -v nginx &>/dev/null || PKGS_TO_INSTALL="$PKGS_TO_INSTALL nginx"

            if [ -n "$PKGS_TO_INSTALL" ]; then
              wait_apt_lock
              apt-get update -qq
              wait_apt_lock
              apt-get install -y $PKGS_TO_INSTALL
            fi

            # certbot 通过 snap 安装，避免 apt 版本与 pip urllib3 的依赖冲突
            if ! certbot --version &>/dev/null; then
              apt-get remove -y certbot python3-certbot-nginx 2>/dev/null || true
              snap install --classic certbot 2>/dev/null || {
                wait_apt_lock
                apt-get update -qq
                wait_apt_lock
                apt-get install -y snapd
                snap install --classic certbot
              }
              ln -sf /snap/bin/certbot /usr/bin/certbot
            fi

            start_nginx() {
              nginx -t
              systemctl start nginx || {
                echo "===== nginx 启动失败，诊断信息 ====="
                systemctl status nginx.service --no-pager || true
                journalctl -xeu nginx.service --no-pager -n 30 || true
                echo "===== 端口占用情况 ====="
                ss -ltnp '( sport = :80 or sport = :443 )' || true
                exit 1
              }
            }

            ensure_ports_are_compatible
            systemctl enable nginx

            # 停止 nginx 确保干净状态（apt 安装后会自动启动）
            systemctl stop nginx 2>/dev/null || true
            # 清理可能残留的 master 进程
            pkill -9 nginx 2>/dev/null || true
            rm -f /run/nginx.pid

            mkdir -p ${{ env.WEB_ROOT }}
            mkdir -p ${{ env.WEB_ROOT }}/.well-known/acme-challenge

            # 移除默认站点避免端口冲突
            rm -f /etc/nginx/sites-enabled/default

            # 启用站点配置（幂等）
            ln -sf /etc/nginx/sites-available/${{ env.DOMAIN }} \
                   /etc/nginx/sites-enabled/${{ env.DOMAIN }}

            # 首次签发前只能写入 80 端口引导配置；已有证书则直接写正式 HTTPS 配置
            if [ -f "/etc/letsencrypt/live/${{ env.DOMAIN }}/fullchain.pem" ] && \
               [ -f "/etc/letsencrypt/live/${{ env.DOMAIN }}/privkey.pem" ]; then
              write_https_nginx_conf
              start_nginx
            else
              write_bootstrap_nginx_conf
              start_nginx

              certbot certonly \
                --webroot \
                -w ${{ env.WEB_ROOT }} \
                -d ${{ env.DOMAIN }} \
                --non-interactive \
                --agree-tos \
                --email ${{ secrets.CERTBOT_EMAIL }}

              systemctl stop nginx
              write_https_nginx_conf
              start_nginx
            fi

            # 确保 certbot 自动续期已启用（snap 版自带续期，apt 版用 systemd timer）
            if systemctl list-unit-files certbot.timer &>/dev/null; then
              systemctl enable certbot.timer
              systemctl start certbot.timer
            fi

      - name: 上传构建产物
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: 'dist/*'
          target: ${{ env.WEB_ROOT }}
          strip_components: 1
          rm: true

      - name: 重载 nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            nginx -t && systemctl reload nginx
