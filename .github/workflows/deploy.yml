name: 构建并部署到服务器

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOMAIN: deps.aimfor.top
  WEB_ROOT: /var/www/deps.aimfor.top

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建
        run: npm run build

      - name: 初始化服务器环境
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            # 等待其他 apt 进程释放锁（最多等 3 分钟）
            wait_apt_lock() {
              local i=0
              while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
                if [ $i -ge 36 ]; then
                  echo "ERROR: apt lock not released after 3 minutes"
                  exit 1
                fi
                echo "Waiting for apt lock... ($((i * 5))s)"
                sleep 5
                i=$((i + 1))
              done
            }

            # 按需安装缺失工具（一次 update，减少耗时）
            PKGS_TO_INSTALL=""
            command -v nginx   &>/dev/null || PKGS_TO_INSTALL="$PKGS_TO_INSTALL nginx"
            command -v certbot &>/dev/null || PKGS_TO_INSTALL="$PKGS_TO_INSTALL certbot python3-certbot-nginx"

            if [ -n "$PKGS_TO_INSTALL" ]; then
              wait_apt_lock
              apt-get update -qq
              wait_apt_lock
              apt-get install -y $PKGS_TO_INSTALL
            fi

            systemctl enable nginx
            systemctl start nginx
            mkdir -p ${{ env.WEB_ROOT }}

            # 写入 nginx 配置（覆盖式，保证配置与代码同步）
            cat > /etc/nginx/sites-available/${{ env.DOMAIN }} << 'NGINX_CONF'
            server {
                listen 80;
                listen [::]:80;
                server_name ${{ env.DOMAIN }};

                root ${{ env.WEB_ROOT }};
                index index.html;

                location / {
                    try_files $uri $uri/ /index.html;
                }

                location /assets/ {
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }
            }
            NGINX_CONF

            # 启用站点配置（幂等）
            ln -sf /etc/nginx/sites-available/${{ env.DOMAIN }} \
                   /etc/nginx/sites-enabled/${{ env.DOMAIN }}

            nginx -t
            systemctl reload nginx

            # 申请 Let's Encrypt 证书（已有证书则跳过）
            if [ ! -d "/etc/letsencrypt/live/${{ env.DOMAIN }}" ]; then
              certbot --nginx \
                -d ${{ env.DOMAIN }} \
                --non-interactive \
                --agree-tos \
                --email ${{ secrets.CERTBOT_EMAIL }} \
                --redirect
            fi

            # 确保 certbot 自动续期 timer 已启用
            systemctl enable certbot.timer
            systemctl start certbot.timer

      - name: 上传构建产物
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: 'dist/*'
          target: ${{ env.WEB_ROOT }}
          strip_components: 1
          rm: true

      - name: 重载 nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            nginx -t && systemctl reload nginx
