# 此文件由 GitHub Actions 自动写入服务器，仅作本地参考
# 首次签发证书时 workflow 会先写入仅监听 80 的引导配置
# 证书签发完成后会切换为下面这份正式配置

server {
    listen 80;
    listen [::]:80;
    server_name deps.aimfor.top;

    location /.well-known/acme-challenge/ {
        root /var/www/deps.aimfor.top;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name deps.aimfor.top;

    root /var/www/deps.aimfor.top;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/deps.aimfor.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deps.aimfor.top/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
