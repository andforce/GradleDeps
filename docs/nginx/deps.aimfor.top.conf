# 此文件由 GitHub Actions 自动写入服务器，仅作本地参考
# certbot --nginx 执行后会自动追加 SSL 相关配置

server {
    listen 80;
    listen [::]:80;
    server_name deps.aimfor.top;

    root /var/www/deps.aimfor.top;
    index index.html;

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源强缓存（Vite 构建产物含 hash，安全）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
